<style>
:root{
  --pa-primary: rgb(25,118,210);
  --pa-primary-700: rgb(17,71,161);
  --pa-primary-600: rgb(0,109,199);
  --pa-primary-500: rgb(6,113,224);
  --pa-primary-050: rgb(238,245,252);
  --pa-primary-12a: rgba(25,118,210,0.12);
  --pa-primary-04a: rgba(25,118,210,0.04);
  --pa-aqua-500: rgb(0,173,238);
  --pa-ink: rgb(33,33,33);
  --pa-ink-2: rgb(66,66,66);
  --pa-sidebar-bg: rgb(32,32,32);
  --pa-sidebar-active: rgb(62,62,62);
  --pa-avatar-green: rgb(76,175,80);
  --pa-ink-3: rgb(102,102,102);
  --pa-ink-4: rgb(113,113,113);
  --pa-ink-5: rgb(117,117,117);
  --pa-ink-6: rgb(137,147,158);
  --pa-ink-7: rgb(158,158,158);
  --pa-line: rgb(238,238,238);
  --pa-line-2: rgb(224,224,224);
  --pa-paper: rgb(255,255,255);
  --pa-divider: rgba(0,0,0,0.12);
  --pa-success: rgb(46,125,50);
  --pa-success-bg: rgb(232,245,233);
  --pa-warning: rgb(233,143,40);
  --pa-warning-bg: rgb(255,244,229);
  --pa-error: rgb(211,47,47);
  --pa-error-bg: rgb(253,237,237);
  --pa-info: rgb(0,121,107);
  --pa-font-sans: "Roboto", system-ui, sans-serif;
  --pa-font-display: "Roboto Flex", "Roboto", system-ui, sans-serif;
  --pa-radius-pill: 16px;
  --pa-radius-sm: 4px;
  --pa-radius-lg: 8px;
  --pa-elev-2: 0 1px 5px 0 rgba(0,0,0,0.12), 0 2px 2px 0 rgba(0,0,0,0.14), 0 3px 1px -2px rgba(0,0,0,0.20);
  --pa-elev-card: 0 20px 25px -5px rgba(0,0,0,0.10), 0 8px 10px -6px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{background:var(--pa-paper);font-family:var(--pa-font-sans);color:var(--pa-ink);-webkit-font-smoothing:antialiased;}
a{color:var(--pa-primary);text-decoration:none;cursor:pointer;}
a:hover{color:var(--pa-primary-700);}
svg.ic{display:inline-block;vertical-align:middle;flex:none;}

/* shell */
.app{display:flex;min-height:100vh;}
.app__main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--pa-divider);display:flex;align-items:center;padding:0 24px;gap:16px;}
.topbar__btn{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--pa-ink-2);cursor:pointer;border:none;background:transparent;}
.topbar__btn:hover{background:rgba(0,0,0,0.04);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--pa-avatar-green);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:500;font-size:12px;}
.app__main .pa-tabs{margin:0 16px;}
.page-band{background:#fff;padding:18px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.page-band__left{flex:1;}
.page-band__title{font-family:var(--pa-font-sans);font-size:26px;letter-spacing:1.3px;color:var(--pa-primary);font-weight:400;margin:0;text-transform:uppercase;}
.search{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 12px;background:#fff;border:1px solid var(--pa-divider);border-radius:4px;width:280px;}
.search input{border:none;outline:none;background:transparent;font-family:var(--pa-font-display);font-size:13px;flex:1;color:var(--pa-ink);}
.content{padding:24px 16px;background:#fff;flex:1;}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}

/* sidebar */
.sb{width:230px;background:var(--pa-sidebar-bg);color:#fff;font-family:var(--pa-font-sans);flex-shrink:0;display:flex;flex-direction:column;}
.sb__head{padding:18px 14px;display:flex;align-items:center;justify-content:space-between;}
.sb__logo{height:22px;display:block;}
.sb__collapse{cursor:pointer;}
.sb__section{padding:4px 0;}
.sb__item{display:flex;align-items:center;gap:14px;padding:12px 18px;font-size:14px;color:#fff;cursor:pointer;user-select:none;}
.sb__item__chev{margin-left:auto;opacity:0.6;}
.sb__item--active{background:var(--pa-sidebar-active);}
.sb__item:hover:not(.sb__item--active){background:rgba(255,255,255,0.06);}
.sb__sub{padding:2px 0 8px;}
.sb__sub-item{display:flex;padding:8px 18px 8px 54px;font-size:13px;color:rgba(255,255,255,0.72);cursor:pointer;}
.sb__sub-item--active{background:var(--pa-sidebar-active);color:#fff;}
.sb__sub-item:hover:not(.sb__sub-item--active){color:#fff;}
.sb__foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,0.6);}

/* table */
.t-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--pa-divider);}
.t-table th,.t-table td{padding:12px 16px;text-align:left;font-size:13px;}
.t-table thead{background:var(--pa-primary-600);color:#fff;}
.t-table th{font-weight:500;font-size:12px;letter-spacing:0.05em;text-transform:uppercase;}
.t-table tbody tr{border-top:1px solid var(--pa-line);}
.t-table tbody tr:hover{background:var(--pa-primary-04a);}

/* board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;border-top:1px solid var(--pa-divider);padding-top:16px;}
.board__col{border-right:1px solid var(--pa-divider);padding-right:16px;min-height:240px;}
.board__col:last-child{border-right:none;}
.board__head{font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--pa-ink-6);padding:0 0 12px;text-align:center;font-weight:500;}
.rmd{border:1px solid var(--pa-divider);border-radius:4px;background:#fff;margin-bottom:12px;overflow:hidden;}
.rmd__band{color:#fff;font-size:12px;font-weight:700;letter-spacing:0.05em;padding:8px 14px;}
.rmd__body{padding:12px 14px;}
.rmd__when{font-size:11px;color:var(--pa-ink-3);margin-bottom:6px;}
.rmd__text{font-size:13px;color:var(--pa-ink);line-height:18px;}
.rmd__foot{display:flex;align-items:center;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid var(--pa-line);}

/* buttons */
.pa-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:32px;padding:0 16px;border-radius:var(--pa-radius-pill);border:none;font-family:var(--pa-font-sans);font-weight:500;font-size:12px;line-height:100%;letter-spacing:0;text-transform:uppercase;cursor:pointer;user-select:none;position:relative;isolation:isolate;transition:background 150ms cubic-bezier(.4,0,.2,1),box-shadow 150ms cubic-bezier(.4,0,.2,1);}
.pa-btn::after{content:"";position:absolute;inset:0;border-radius:inherit;background:transparent;pointer-events:none;z-index:1;}
.pa-btn>*{position:relative;z-index:2;}
.pa-btn--sm{height:24px;padding:0 12px;font-size:10.8px;}
.pa-btn--primary{background:var(--pa-primary);color:#fff;box-shadow:var(--pa-elev-2);}
.pa-btn--primary:hover::after{background:rgba(255,255,255,0.08);}
.pa-btn--primary:active::after{background:rgba(0,0,0,0.24);}
.pa-btn--tertiary{background:transparent;color:var(--pa-primary);}
.pa-btn--tertiary:hover::after{background:var(--pa-primary-04a);}
.pa-btn--tertiary:active::after{background:rgba(25,118,210,0.24);}

/* chips */
.pa-chip{display:inline-flex;align-items:center;justify-content:center;height:28px;padding:0 12px;border-radius:14px;font-family:var(--pa-font-display);font-weight:700;font-size:10.8px;line-height:16.2px;letter-spacing:0;text-transform:uppercase;background:var(--pa-line-2);color:var(--pa-ink);cursor:pointer;user-select:none;position:relative;isolation:isolate;}
.pa-chip::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;}
.pa-chip>*{position:relative;z-index:2;}
.pa-chip--selected{background:var(--pa-primary-12a);color:var(--pa-primary);}
.pa-chip:hover.pa-chip--selected::after{background:var(--pa-primary-04a);}
.pa-chip:hover:not(.pa-chip--selected)::after{background:rgba(33,33,33,0.04);}

/* fields */
.pa-field{display:flex;flex-direction:column;width:100%;font-family:var(--pa-font-sans);}
.pa-field__label{font-family:var(--pa-font-sans);font-size:13px;letter-spacing:0.05em;color:var(--pa-ink-3);padding-bottom:6px;}
.pa-field__input{border:none;border-bottom:1px solid var(--pa-ink-7);padding:6px 0;font-family:var(--pa-font-display);font-size:12.8px;line-height:19.2px;color:var(--pa-ink);background:transparent;outline:none;transition:border-color 150ms;}
.pa-field__input::placeholder{color:var(--pa-ink-6);}
.pa-field__input:focus{border-bottom-color:var(--pa-primary);border-bottom-width:2px;padding-bottom:5px;}

/* tabs */
.pa-tabs{display:flex;align-items:stretch;height:48px;background:var(--pa-primary);color:#fff;}
.pa-tabs__btn{flex:1;height:100%;padding:0 16px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--pa-font-sans);font-weight:500;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#fff;background:transparent;border:none;cursor:pointer;}
.pa-tabs__btn--active{background:var(--pa-primary-700);}
.pa-tabs__btn:hover:not(.pa-tabs__btn--active){background:rgba(255,255,255,0.06);}

/* app-specific panels */
.ov-panel{background:#fff;border:1px solid var(--pa-divider);border-radius:8px;box-shadow:var(--pa-elev-card);}
.ov-scroll::-webkit-scrollbar{width:8px;}
.ov-scroll::-webkit-scrollbar-thumb{background:var(--pa-line-2);border-radius:4px;}
</style>
</head>

    stats={sent:sent,deliv:deliv,open:open,bounce:bounce};
    reasons=splitReasons(bounce,[["Hard bounce",0.48],["Mailbox full",0.27],["Spam block",0.16],["Soft bounce",0.09]]);
  } else {
    var deliv2=Math.round(sent*0.965), fail=sent-deliv2;
    stats={sent:sent,deliv:deliv2,fail:fail};
    reasons=splitReasons(fail,[["Invalid number",0.5],["Carrier rejected",0.3],["Opted out",0.2]]);
  }
  var daysAgo=Math.round((dayStart(TODAY)-dayStart(sentDt))/86400000);
  return {id:id,code:a.code,type:a.type,label:a.label,rtype:r.rtype,ch:ch,sentDt:sentDt,sent:sent,stats:stats,reasons:reasons,daysAgo:daysAgo};
}
function buildMessages(){
  var out=[];
  AA.forEach(function(a){
    var ev=new Date(a.event[0],a.event[1],a.event[2],a.event[3],a.event[4]);
    REM.forEach(function(r){
      var sentDt=new Date(ev.getTime()+r.off*3600000);
      if(sentDt>TODAY) return;
      r.chans.forEach(function(ch){
        var emailSent=Math.round(a.base*r.factor);
        var sent = ch==="SMS" ? Math.round(emailSent*0.47) : emailSent;
        out.push(mkMsg(a,r,ch,sentDt,sent));
      });
    });
  });
  return out;
}
function msgRow(m){
  var s=m.stats;
  var metric = m.ch==="EMAIL"
    ? num(s.sent)+" sent \u00b7 "+pct(s.deliv,s.sent)+" delivered \u00b7 "+pct(s.open,s.deliv)+" open"
    : num(s.sent)+" sent \u00b7 "+pct(s.deliv,s.sent)+" delivered";
  return {id:m.id,code:m.code,rtype:m.rtype,chLabel:m.ch,chColor:channelColor(m.ch),
    metricLine:metric,timeShort:fmtTime(m.sentDt),dateShort:MON[m.sentDt.getMonth()]+" "+m.sentDt.getDate()};
}
function buildDrill(m){
  var s=m.stats, color=channelColor(m.ch);
  var backLabel = state.anQuery.trim() ? "Search results" : "Recently Sent";
  var funnel, tiles, reasonsTitle;
  if(m.ch==="EMAIL"){
    funnel=[
      {label:"Sent",value:num(s.sent),pct:"100%",width:"100%"},
      {label:"Delivered",value:num(s.deliv),pct:pct(s.deliv,s.sent),width:Math.round(s.deliv/s.sent*100)+"%"},
      {label:"Opened",value:num(s.open),pct:pct(s.open,s.deliv)+" of delivered",width:Math.round(s.open/s.sent*100)+"%"}
    ];
    tiles=[
      {label:"Delivery",value:pct(s.deliv,s.sent),color:"var(--pa-ink)"},
      {label:"Open Rate",value:pct(s.open,s.deliv),color:"var(--pa-ink)"},
      {label:"Bounced",value:num(s.bounce),color:"var(--pa-error)"}
    ];
    reasonsTitle="Bounce Reasons";
  } else {
    funnel=[
      {label:"Sent",value:num(s.sent),pct:"100%",width:"100%"},
      {label:"Delivered",value:num(s.deliv),pct:pct(s.deliv,s.sent),width:Math.round(s.deliv/s.sent*100)+"%"}
    ];
    tiles=[
      {label:"Delivery",value:pct(s.deliv,s.sent),color:"var(--pa-ink)"},
      {label:"Failed",value:num(s.fail),color:"var(--pa-error)"}
    ];
    reasonsTitle="Failure Reasons";
  }
  var rmax=Math.max.apply(null,[1].concat(m.reasons.map(function(r){return r[1];})));
  var reasons=m.reasons.map(function(r){ return {label:r[0],count:String(r[1]),width:Math.round(r[1]/rmax*100)+"%"}; });
  return {code:m.code,rtype:m.rtype,chLabel:m.ch,chColor:color,backLabel:backLabel,
    sentFull:fmtWhen(m.sentDt),funnel:funnel,tiles:tiles,reasonsTitle:reasonsTitle,
    reasons:reasons,hasReasons:reasons.length>0};
}

    ? '<span style="font-size:11px;color:var(--pa-ink-3);white-space:nowrap;">'+m.timeShort+'</span>'
    : '<span style="font-size:11px;color:var(--pa-ink-4);white-space:nowrap;">'+m.dateShort+'</span>';
  return '<button data-act="msg" data-id="'+m.id+'" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:1px solid var(--pa-divider);border-radius:6px;background:#fff;cursor:pointer;text-align:left;">'+
    '<span style="width:6px;align-self:stretch;background:'+m.chColor+';border-radius:3px;flex-shrink:0;"></span>'+
    '<div style="flex:1;min-width:0;text-align:left;">'+
      '<div style="display:flex;align-items:center;gap:8px;">'+head+'<span style="font-size:10px;font-weight:700;letter-spacing:0.5px;color:'+m.chColor+';">'+m.chLabel+'</span></div>'+
      '<div style="font-size:11.5px;color:var(--pa-ink-4);margin-top:2px;">'+m.metricLine+'</div>'+
    '</div>'+dateCol+icon("chevron-right",18,"var(--pa-ink-6)")+'</button>';
}

function reminders(v){
  var cardsH = v.boardReminders.map(function(r){
    return '<div class="rmd"><div class="rmd__band" style="background:'+r.color+';">'+r.band+'</div>'+
      '<div class="rmd__body"><div class="rmd__when">'+r.when+'</div><div class="rmd__text">'+esc(r.body)+'</div>'+
      '<div class="rmd__foot"><button class="pa-btn pa-btn--tertiary pa-btn--sm" style="color:var(--pa-error);">Suspend</button><div style="flex:1;"></div>'+
      '<button class="pa-btn pa-btn--tertiary pa-btn--sm">Clone</button>'+(r.isEmail?'<button class="pa-btn pa-btn--tertiary pa-btn--sm">Test</button>':'')+'<button class="pa-btn pa-btn--tertiary pa-btn--sm">Edit</button></div></div></div>';
  }).join("");
  return '<div>'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;"><button class="pa-btn pa-btn--tertiary pa-btn--sm" data-act="go" data-tab="overview">'+icon("chevron-left",16)+'<span>Back to Overview</span></button></div>'+
    '<h2 style="font-family:var(--pa-font-sans);font-weight:500;font-size:18px;margin:0 0 16px;color:var(--pa-ink);">Reminders ('+v.selectedActivity+')</h2>'+
    '<div style="font-size:13px;color:var(--pa-ink);margin-bottom:8px;font-weight:500;">Reminder Type:</div>'+
    '<div class="filter-row">'+
      '<span class="'+v.filtEmailCls+'" data-act="filter" data-ch="EMAIL">Email</span>'+
      '<span class="'+v.filtSmsCls+'" data-act="filter" data-ch="SMS">SMS</span>'+
      (v.hasFilter?'<a data-act="clearFilter" style="color:var(--pa-primary);font-size:12px;letter-spacing:0.05em;cursor:pointer;text-transform:uppercase;font-weight:500;">Clear Filters</a>':'')+
    '</div>'+
    '<div class="board"><div class="board__col"><div class="board__head">Scheduled ('+v.boardCount+')</div>'+cardsH+'</div>'+
    '<div class="board__col"><div class="board__head">Sending</div></div>'+
    '<div class="board__col"><div class="board__head">Suspended</div></div>'+
    '<div class="board__col"><div class="board__head">Sent</div></div></div>'+
  '</div>';
}
function placeholder(v){
  return '<div style="padding:64px 24px;text-align:center;color:var(--pa-ink-3);">'+
    icon("view-dashboard-outline",48,"var(--pa-ink-7)")+
    '<div style="font-size:16px;color:var(--pa-ink);margin-top:12px;">'+v.placeholderLabel+'</div>'+
    '<div style="margin-top:6px;font-size:13px;">This tab is unchanged from the existing Notifications section.</div></div>';
}

/* ---------- compute ---------- */
function compute(){
  var S=state;
  var enriched = ACTS.map(function(a){
    var dt=new Date(a.d[0],a.d[1],a.d[2],a.d[3],a.d[4]);
    var diff=Math.round((dt-TODAY)/86400000);
    var reviewed=!!S.reviewed[a.code];
    var statusLabel,statusBg,statusFg;
    if(reviewed){ statusLabel="Reviewed"; statusBg="var(--pa-success-bg)"; statusFg="var(--pa-success)"; }
    else { statusLabel="Default"; statusBg="var(--pa-line-2)"; statusFg="var(--pa-ink-3)"; }
    var badgeBg,badgeFg;
    if(diff<=1){ badgeBg="var(--pa-warning-bg)"; badgeFg="var(--pa-warning)"; }
    else if(diff<=4){ badgeBg="var(--pa-primary-050)"; badgeFg="var(--pa-primary)"; }
    else { badgeBg="var(--pa-line)"; badgeFg="var(--pa-ink-4)"; }
    var daysLabel = diff<=0?"Today":diff===1?"Tomorrow":"In "+diff+" days";
    return {code:a.code,type:a.type,typeLabel:a.typeLabel,dt:dt,diff:diff,reviewed:reviewed,
      statusLabel:statusLabel,statusBg:statusBg,statusFg:statusFg,badgeBg:badgeBg,badgeFg:badgeFg,daysLabel:daysLabel,
      dateLabel:fmtDate(dt),
      reviewIcon: reviewed?"check-circle":"check-circle-outline",
      reviewColor: reviewed?"var(--pa-success)":"var(--pa-ink-6)",
      reviewTitle: reviewed?"Marked reviewed \u2014 click to unmark":"Mark as reviewed"};
  });

  var activities, rangeCaption;
  if(S.range==="custom"){
    var cs = S.customStart ? new Date(S.customStart+"T00:00") : TODAY;
    var ce = S.customEnd ? new Date(S.customEnd+"T23:59") : new Date(TODAY.getTime()+365*86400000);
    activities = enriched.filter(function(a){ return a.dt>=cs && a.dt<=ce; });
    rangeCaption = "Custom range \u2014 needing review";
  } else {
    activities = enriched.filter(function(a){ return a.diff>=0 && a.diff<=S.range; });
    rangeCaption = "Needing review \u00b7 next "+S.range+" days";
  }
  var needsAttention = activities.filter(function(a){ return !a.reviewed; }).length;

  var kpis = [
    {label:"Activities in Window", value:String(activities.length), sub: rangeCaption.replace("Needing review \u00b7 ","").replace("Custom range \u2014 needing review","Custom date range"), color:"var(--pa-primary)"},
    {label:"Needs Attention", value:String(needsAttention), sub:"Not yet reviewed", color:"var(--pa-warning)"},
    {label:"Sending Today", value:String(QUEUE.today.length), sub:"3 email \u00b7 2 SMS", color:"var(--pa-info)"},
    {label:"Delivery Rate (24h)", value:"99.4%", sub:"12,480 delivered \u00b7 74 failed", color:"var(--pa-success)"}
  ];

  var qMeta = { today:{label:"Today",date:"Jul 16"}, tomorrow:{label:"Tomorrow",date:"Jul 17"}, plus2:{label:"Sat",date:"Jul 18"} };
  function tabBtn(id){
    var active=S.queueDay===id;
    return "flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;border:none;cursor:pointer;background:"+
      (active?"var(--pa-primary-050)":"#fff")+";color:"+(active?"var(--pa-primary)":"var(--pa-ink-2)")+
      ";border-bottom:2px solid "+(active?"var(--pa-primary)":"transparent")+";";
  }
  var queueTabs = ["today","tomorrow","plus2"].map(function(id){
    return {id:id,label:qMeta[id].label,date:qMeta[id].date,count:QUEUE[id].length+" queued",style:tabBtn(id)};
  });
  var queueItems = QUEUE[S.queueDay].map(function(n){ var o={}; for(var k in n)o[k]=n[k]; o.color=channelColor(n.channel); return o; });

  var msgs = buildMessages();
  var byId={}; msgs.forEach(function(m){ byId[m.id]=m; });
  var drill=null;
  if(S.anMsgId && byId[S.anMsgId]) drill=buildDrill(byId[S.anMsgId]);
  var anMode = drill?"drill":(S.anQuery.trim()?"search":"recent");

  function recentTabBtn(n){
    var active=S.anRecentDay===n;
    return "flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;border:none;cursor:pointer;background:"+
      (active?"var(--pa-primary-050)":"#fff")+";color:"+(active?"var(--pa-primary)":"var(--pa-ink-2)")+
      ";border-bottom:2px solid "+(active?"var(--pa-primary)":"transparent")+";";
  }
  var recentTabs = [1,2,3].map(function(n){
    var dd=new Date(TODAY.getTime()-n*86400000);
    var cnt=msgs.filter(function(m){ return m.daysAgo===n; }).length;
    return {n:n,style:recentTabBtn(n),label:n===1?"Yesterday":DOW[dd.getDay()],date:MON[dd.getMonth()]+" "+dd.getDate(),count:cnt+" sent"};
  });
  var recentItems = msgs.filter(function(m){ return m.daysAgo===S.anRecentDay; })
    .sort(function(a,b){ return b.sentDt-a.sentDt; }).map(msgRow);

  var q=S.anQuery.trim().toUpperCase();
  var searchGroups=[];
  if(q){
    var codes=[]; msgs.forEach(function(m){ if(m.code.toUpperCase().indexOf(q)>=0 && codes.indexOf(m.code)<0) codes.push(m.code); });
    searchGroups = codes.map(function(code){
      var gm=msgs.filter(function(m){ return m.code===code; }).sort(function(a,b){ return a.sentDt-b.sentDt; });
      var tSent=0,tDeliv=0,eSent=0,eOpen=0;
      gm.forEach(function(m){ tSent+=m.stats.sent; tDeliv+=m.stats.deliv; if(m.ch==="EMAIL"){ eSent+=m.stats.sent; eOpen+=m.stats.open; } });
      var summary = gm.length+" sent \u00b7 "+pct(tDeliv,tSent)+" delivered"+(eSent?" \u00b7 "+pct(eOpen,eSent)+" open":"");
      return {code:code,label:gm[0].label,summary:summary,messages:gm.map(msgRow)};
    });
  }

  var sel = ACTS.filter(function(a){ return a.code===S.selectedActivity; })[0] || ACTS[0];
  var selDt=new Date(sel.d[0],sel.d[1],sel.d[2],sel.d[3],sel.d[4]);
  var H=3600000;
  var RTYPES=[
    {band:"EMAIL",ch:"EMAIL",off:-168*H,body:"EVENT REMINDER: Don't forget to join us Next Week for {{ title }} for which you registered."},
    {band:"EMAIL",ch:"EMAIL",off:-48*H,body:"Re: This is your 48 HOUR REMINDER that you are scheduled to attend {{ title }}"},
    {band:"SMS",ch:"SMS",off:-48*H,body:"This is your 48 HOUR REMINDER for the PRIME Live CME/CE Event you are registered to attend."},
    {band:"EMAIL",ch:"EMAIL",off:-24*H,body:"REMINDER! Happening Live Tomorrow: {{ title }}"},
    {band:"SMS",ch:"SMS",off:-24*H,body:"REMINDER! Happening Live Tomorrow \u2014 PRIME CME/CE Event you are registered to attend:"},
    {band:"EMAIL",ch:"EMAIL",off:-0.5*H,body:"GET READY! Starting in 30 Minutes: {{ title }}"},
    {band:"SMS",ch:"SMS",off:-0.5*H,body:"GET READY! Starting in just 30 minutes \u2014 PRIME Live CME/CE Event. Please join us."},
    {band:"POST-EVENT THANK YOU",ch:"EMAIL",off:24*H,body:"Thank You"}
  ];
  var boardReminders = RTYPES.map(function(r){
    return {band:r.band,color:channelColor(r.ch),isEmail:r.ch==="EMAIL",when:fmtWhen(new Date(selDt.getTime()+r.off)),body:r.body,ch:r.ch};
  });
  if(S.filter) boardReminders = boardReminders.filter(function(r){ return r.ch===S.filter; });

  function chip(on){ return "pa-chip"+(on?" pa-chip--selected":""); }
  function rngChip(vv){ return "pa-chip"+(S.range===vv?" pa-chip--selected":""); }

  return {
    activeTab:S.activeTab,
    isPlaceholder:["confirmation","followups","settings"].indexOf(S.activeTab)>=0,
    placeholderLabel:S.activeTab==="confirmation"?"Confirmation":S.activeTab==="followups"?"Follow-ups":"Settings",
    kpis:kpis, rangeCaption:rangeCaption, isCustomRange:S.range==="custom",
    rng7cls:rngChip(7), rng14cls:rngChip(14), rng30cls:rngChip(30), rngCustomcls:"pa-chip"+(S.range==="custom"?" pa-chip--selected":""),
    customStart:S.customStart, customEnd:S.customEnd,
    activities:activities, noActivities:activities.length===0,
    queueTabs:queueTabs, queueItems:queueItems,
    anQuery:S.anQuery, anHasQuery:!!S.anQuery, anMode:anMode,
    recentTabs:recentTabs, recentItems:recentItems, recentEmpty:recentItems.length===0,
    searchGroups:searchGroups, hasResults:searchGroups.length>0, drill:drill,
    selectedActivity:S.selectedActivity, boardReminders:boardReminders, boardCount:boardReminders.length,
    filtEmailCls:chip(S.filter==="EMAIL"), filtSmsCls:chip(S.filter==="SMS"), hasFilter:!!S.filter
  };
}

/* ---------- render ---------- */
function render(){
  var focusId=null, selStart=null, selEnd=null;
  var ae=document.activeElement;
  if(ae && ae.id && (ae.id==="an-search"||ae.id==="top-search")){
    focusId=ae.id;
    try{ selStart=ae.selectionStart; selEnd=ae.selectionEnd; }catch(e){}
  }
  var v=compute();
  var main;
  if(v.activeTab==="reminders") main=reminders(v);
  else if(v.isPlaceholder) main=placeholder(v);
  else main=overview(v);

  document.getElementById("app").innerHTML =
    '<div class="app">'+sidebar()+
      '<div class="app__main">'+topbar()+
        '<div class="page-band"><div class="page-band__left"><h1 class="page-band__title">Notifications</h1></div></div>'+
        tabs(v)+
        '<div class="content ov-scroll" style="overflow-y:auto;">'+main+'</div>'+
      '</div>'+
    '</div>';

  if(focusId){
    var el=document.getElementById(focusId);
    if(el){ el.focus(); if(selStart!=null){ try{ el.setSelectionRange(selStart,selEnd); }catch(e){} } }
  }
}

/* ---------- events ---------- */
document.getElementById("app").addEventListener("click", function(e){
  var t=e.target.closest("[data-act]");
  if(!t) return;
  var act=t.getAttribute("data-act");
  if(act==="go") setState({activeTab:t.getAttribute("data-tab")});
  else if(act==="range"){ var r=t.getAttribute("data-r"); setState({range: r==="custom"?"custom":parseInt(r,10)}); }
  else if(act==="review"){ var c=t.getAttribute("data-code"); var rv=Object.assign({},state.reviewed); rv[c]=!rv[c]; setState({reviewed:rv}); }
  else if(act==="open") setState({selectedActivity:t.getAttribute("data-code"),activeTab:"reminders",filter:null});
  else if(act==="queue") setState({queueDay:t.getAttribute("data-day")});
  else if(act==="recent") setState({anMsgId:null,anRecentDay:parseInt(t.getAttribute("data-n"),10)});
  else if(act==="msg") setState({anMsgId:t.getAttribute("data-id")});
  else if(act==="anBack") setState({anMsgId:null});
  else if(act==="anClear") setState({anMsgId:null,anQuery:""});
  else if(act==="filter"){ var ch=t.getAttribute("data-ch"); setState({filter: state.filter===ch?null:ch}); }
  else if(act==="clearFilter") setState({filter:null});
});
document.getElementById("app").addEventListener("input", function(e){
  var t=e.target;
  if(t.getAttribute && t.getAttribute("data-input")==="anQuery") setState({anMsgId:null,anQuery:t.value});
});
document.getElementById("app").addEventListener("change", function(e){
  var t=e.target, k=t.getAttribute && t.getAttribute("data-change");
  if(k==="customStart") setState({customStart:t.value});
  else if(k==="customEnd") setState({customEnd:t.value});
});

render();
</script>
</body>
</html>
